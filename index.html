<!DOCTYPE html>
<html>
  <head>
    <title>Bracu Bus Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      
      body {
        font-family: 'Nunito', sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .landing-box {
        background: white;
        border-radius: 24px;
        padding: 3rem 2.5rem;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.25);
        text-align: center;
      }

      .logo-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.85rem;
        margin-bottom: 0.5rem;
      }

      .logo-row img {
        width: 56px;
      }

      .portal-title {
        font-size: 1.5rem;
        font-weight: 800;
        color: #1e293b;
        text-align: left;
        line-height: 1.2;
      }

      .portal-subtitle {
        font-size: 0.82rem;
        color: #6b7280;
        text-align: left;
      }

      .divider {
        border: none;
        border-top: 1px solid #f3f4f6;
        margin: 1.75rem 0;
      }

      .choose-label {
        font-size: 0.95rem;
        font-weight: 700;
        color: #374151;
        margin-bottom: 1.25rem;
      }

      .role-cards {
        display: flex;
        gap: 1rem;
      }

      .role-card {
        flex: 1;
        padding: 2rem 1rem;
        border: 2px solid #e5e7eb;
        border-radius: 18px;
        cursor: pointer;
        text-decoration: none;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #f9fafb;
        transition: all 0.2s ease;
      }

      .role-card:hover {
        border-color: #4f46e5;
        background: #ede9fe;
        transform: translateY(-4px);
        box-shadow: 0 10px 24px rgba(79, 70, 229, 0.18);
      }

      .role-icon {
        font-size: 2.8rem;
        margin-bottom: 0.85rem;
      }

      .role-name {
        font-size: 1.05rem;
        font-weight: 800;
        color: #1e293b;
        margin-bottom: 0.3rem;
      }

      .role-desc {
        font-size: 0.78rem;
        color: #6b7280;
        line-height: 1.4;
      }

      .footer-text {
        margin-top: 2rem;
        font-size: 0.78rem;
        color: #9ca3af;
      }
    </style>
  </head>
  <body>
    <div class="landing-box">
      <div class="logo-row">
        <img src="Student/brac.png" alt="BRACU Logo" />
        <div>
          <div class="portal-title">Bracu Bus Portal</div>
          <div class="portal-subtitle">BRAC University Transportation</div>
        </div>
      </div>

      <hr class="divider" /> 

      <p class="choose-label">Select your role to continue</p>

      <div class="role-cards">
        <a class="role-card" href="Student/dashboard1.html">
          <div class="role-icon">🎓</div>
          <div class="role-name">Student</div>
          <div class="role-desc">Login or register to access bus services</div>
        </a>
        <a class="role-card" href="Admin/dashboard1.html">
          <div class="role-icon">🛡️</div>
          <div class="role-name">Admin</div>
          <div class="role-desc">Manage routes, schedules & portal</div>
        </a>
      </div>

      <p class="footer-text">© 2026 BRAC University — All rights reserved</p>
    </div>
  </body>
</html>
